name: Deploy to GitHub Pages via Actions

on:
  push:
    paths:
      - '**/*.html'
      - '**/*.css'
      - '**/*.js'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.gif'
      - '**/*.svg'
      - '**/*.ico'
      - '**/*.txt'
      - '**/*.pdf'
      # Note: Removed *.chopro and *.cho to prevent race condition
      # ChordPro changes will trigger auto-generate-pdfs.yml which commits PDFs
      # and those PDF commits will trigger this deployment workflow
      - '**/*.mscz'
      - '**/*.urltxt'
      - '**/*.hide'
      - '**/*.easy'
      - 'music/scripts/VideoIndex History.html'
      - 'robots.txt'
    branches: [ main, master ]
  repository_dispatch:
    types: [deploy-pages]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy all files'
        required: false
        default: false
        type: boolean

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_COLOR: 1
  # Suppress upstream Node.js deprecation warnings emitted by GitHub actions internals
  NODE_OPTIONS: --no-deprecation

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0  # Fetch full history for git timestamp lookups
    
    - name: Setup Pages
      uses: actions/configure-pages@v6
    
    - name: Install Python dependencies for helper scripts
      run: |
        python -m pip install --upgrade pip
        pip install beautifulsoup4 pipx

    - name: Install genlist via pipx
      run: |
        python -m pipx ensurepath
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        python -m pipx install genlist-butler
        genlist --version || echo "genlist installed"

    - name: Build site artifacts
      run: |
        python build_site.py
    
    - name: Commit .urltxt updates
      if: github.actor != 'github-actions[bot]'
      run: |
        echo "🔍 Checking for .urltxt changes to commit..."
        if git status --short -- ':(glob)**/*.urltxt' | grep -q .; then
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A -- ':(glob)**/*.urltxt'
          git commit -m "chore: sync video link .urltxt files [skip ci]"
          TARGET_BRANCH="${GITHUB_REF_NAME:-${GITHUB_REF#refs/heads/}}"
          echo "📤 Pushing .urltxt updates to ${TARGET_BRANCH}"
          git push origin "HEAD:${TARGET_BRANCH}"
        else
          echo "✅ No .urltxt changes detected"
        fi

    - name: Verify prepared site files
      run: |
        echo "📁 Site files prepared:"
        echo "HTML files:"
        ls -la _site/*.html | head -5 || echo "No HTML files found"
        echo "Archive file:"
        ls -la _site/ukulele-song-archive.html || echo "Archive file missing"
        echo "Sitemap file:"
        ls -la _site/sitemap.xml || echo "Sitemap missing"
        echo "PDF count:"
        find _site -name "*.pdf" -type f | wc -l
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: ./_site

  deploy:
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
      with:
        # Default polling timeout is 10m; raise it for larger artifacts/backlog periods.
        timeout: 1800000
        # Allow more transient API/status errors while polling deployment state.
        error_count: 20
